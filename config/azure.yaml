chroma_path: /app/data/chroma_db
bm25_path: /app/data/bm25_index
collection_name: notion_kb
max_tool_calls: 5
embed_backend: sentence_transformers

llm:
  model: ""
  embed_model: "BAAI/bge-small-en-v1.5"
  base_url: ""

retriever:
  min_similarity: 0.50
  top_n: 20
  rrf_k: 60
  bm25_top_k: 10
  reranker_model: cross-encoder/ms-marco-MiniLM-L-2-v2
  reranker_top_k: 5
  few_shot_max: 3

ingestion:
  chunk_size: 800
  chunk_overlap: 100
  vision_model: ""

azure_openai:
  endpoint: "https://YOUR-RESOURCE.openai.azure.com/"
  deployment: "gpt-4o-mini"
  api_version: "2024-11-01-preview"

groq:
  model: "llama-3.1-8b-instant"

redis:
  url: "rediss://YOUR-CACHE.redis.cache.windows.net:6380"
  ttl_seconds: 3600
  similarity_threshold: 0.95
