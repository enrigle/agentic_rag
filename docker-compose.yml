services:
  app:
    build: .
    ports:
      # Loopback only — the app has no authentication; do not publish on 0.0.0.0.
      - "127.0.0.1:8502:8501"
    env_file:
      - .env
    environment:
      - RAG_CONFIG_PATH=config/docker.yaml
      - TRANSFORMERS_VERBOSITY=error
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./evals:/app/evals
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  redis_data:
